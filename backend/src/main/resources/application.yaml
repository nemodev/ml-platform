spring:
  application:
    name: ml-platform-backend
  datasource:
    url: jdbc:postgresql://postgresql.ml-platform.svc:5432/ml_platform
    username: postgres
    password: localdevpassword
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak.ml-platform.svc:8080/realms/ml-platform
          jwk-set-uri: http://keycloak.ml-platform.svc:8080/realms/ml-platform/protocol/openid-connect/certs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  cors:
    allowed-origins: https://portal.ml-platform.local

workspace:
  default-notebook: ${WORKSPACE_DEFAULT_NOTEBOOK:}
  profiles:
    - id: exploratory
      name: Exploratory
      description: Interactive data exploration and small experiments
      default: true
      cpu-request: "1"
      cpu-limit: "2"
      memory-request: "2G"
      memory-limit: "4G"
    - id: standard
      name: Standard
      description: Typical ML workflows and medium-sized datasets
      default: false
      cpu-request: "2"
      cpu-limit: "4"
      memory-request: "4G"
      memory-limit: "8G"
    - id: compute-intensive
      name: Compute-Intensive
      description: Large dataset processing and model training
      default: false
      cpu-request: "4"
      cpu-limit: "8"
      memory-request: "8G"
      memory-limit: "16G"

services:
  jupyterhub:
    url: http://hub.ml-platform.svc:8081
    proxy-url: http://proxy-public.ml-platform.svc:80
    api-token: ${JUPYTERHUB_API_TOKEN:ml-platform-jupyterhub-token}
  mlflow:
    url: http://mlflow.ml-platform.svc:5000
    tracking-url: http://mlflow.ml-platform.svc:5000
    artifact-destination: s3://ml-platform-mlflow/ml-platform/mlflow/artifacts
  airflow:
    url: http://airflow-webserver.ml-platform.svc:8080
    username: admin
    password: admin
  kserve:
    namespace: ml-platform-serving
    service-account-name: kserve-s3-sa
    model-format-name: mlflow
    runtime-name: kserve-mlserver
    deployment-mode: Standard
    mock-enabled: false
  minio:
    endpoint: http://minio.ml-platform.svc:9000
    access-key: minioadmin
    secret-key: minioadmin
    pipelines-bucket: ml-platform-pipelines
    pipelines-prefix: ml-platform/pipelines
    presign-expiry-seconds: 900
    analysis-bucket: ml-platform
    analysis-prefix: analysis
  notebook-images:
    registry:
      type: ${REGISTRY_TYPE:builtin}
      endpoint: ${REGISTRY_ENDPOINT:registry.ml-platform.svc:5000}
      username: ${REGISTRY_USERNAME:}
      password: ${REGISTRY_PASSWORD:}
      insecure: ${REGISTRY_INSECURE:true}
    build:
      namespace: ${NAMESPACE:ml-platform}
      timeout-minutes: 60
      max-concurrent-builds: 3
      kaniko-image: gcr.io/kaniko-project/executor:v1.23.2
      build-cpu-request: "1"
      build-memory-request: 2Gi
      build-cpu-limit: "2"
      build-memory-limit: 4Gi
    base-image-prefix: ${BASE_IMAGE_PREFIX:ml-platform/notebook-base}
    base-image-registry: ${BASE_IMAGE_REGISTRY:}
    python-versions:
      - "3.10"
      - "3.11"
      - "3.12"
