apiVersion: v1
kind: Pod
metadata:
  labels:
    component: airflow-task
spec:
  serviceAccountName: airflow-spark-sa
  restartPolicy: Never
  containers:
    - name: base
      image: ml-platform-notebook:latest
      imagePullPolicy: IfNotPresent
      env:
        - name: AWS_ENDPOINT_URL
          value: http://minio.ml-platform.svc:9000
        - name: AWS_DEFAULT_REGION
          value: us-east-1
        - name: AWS_ACCESS_KEY_ID
          value: minioadmin
        - name: AWS_SECRET_ACCESS_KEY
          value: minioadmin
        - name: MLFLOW_TRACKING_URI
          value: http://mlflow.ml-platform.svc:5000
        - name: SPARK_CONF_DIR
          value: /etc/spark/conf
      volumeMounts:
        - name: spark-defaults
          mountPath: /etc/spark/conf
  volumes:
    - name: spark-defaults
      configMap:
        name: notebook-spark-defaults
        optional: true
