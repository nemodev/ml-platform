jupyterhub:
  prePuller:
    hook:
      enabled: false
    continuous:
      enabled: false

  hub:
    db:
      type: postgres
      url: postgresql://postgres:localdevpassword@postgresql.ml-platform.svc.cluster.local:5432/jupyterhub
      # SQLite fallback option for quick local experiments:
      # type: sqlite-pvc
    services:
      ml-platform-backend:
        apiToken: ml-platform-jupyterhub-token
        admin: true
    config:
      GenericOAuthenticator:
        authorize_url: http://localhost:8180/realms/ml-platform/protocol/openid-connect/auth
        token_url: http://keycloak.ml-platform.svc:8080/realms/ml-platform/protocol/openid-connect/token
        userdata_url: http://keycloak.ml-platform.svc:8080/realms/ml-platform/protocol/openid-connect/userinfo
        oauth_callback_url: http://localhost:8181/hub/oauth_callback
    extraConfig:
      00-security.py: |
        c.JupyterHub.tornado_settings = {
          "headers": {
            "Content-Security-Policy": "frame-ancestors 'self' http://localhost:4200 http://localhost:8080"
          }
        }

  singleuser:
    extraEnv:
      MLFLOW_TRACKING_URI: http://host.docker.internal:8080/api/v1/mlflow-proxy
      S3_PREFIX: ml-platform
      AWS_ENDPOINT_URL: "http://minio.ml-platform.svc:9000"
      AWS_ALLOW_HTTP: "true"
      AWS_ACCESS_KEY_ID:
        valueFrom:
          secretKeyRef:
            name: sample-data-readonly-credentials
            key: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY:
        valueFrom:
          secretKeyRef:
            name: sample-data-readonly-credentials
            key: AWS_SECRET_ACCESS_KEY
    networkPolicy:
      egressAllowRules:
        privateIPs: true
