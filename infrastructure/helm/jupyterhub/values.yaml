jupyterhub:
  hub:
    db:
      type: postgres
      url: postgresql://postgres:localdevpassword@postgresql.ml-platform.svc.cluster.local:5432/jupyterhub
    config:
      JupyterHub:
        authenticator_class: generic-oauth
        load_roles:
          - name: jupyterhub-idle-culler
            scopes:
              - list:users
              - read:users:activity
              - admin:servers
              - delete:servers
              - admin:users
            services:
              - jupyterhub-idle-culler
          - name: platform-api-role
            scopes:
              - admin:users
              - admin:servers
            services:
              - platform-api
      Authenticator:
        auto_login: true
      GenericOAuthenticator:
        client_id: ml-platform-jupyterhub
        client_secret: ml-platform-jupyterhub-secret
        authorize_url: http://keycloak.ml-platform.svc:8080/realms/ml-platform/protocol/openid-connect/auth
        token_url: http://keycloak.ml-platform.svc:8080/realms/ml-platform/protocol/openid-connect/token
        userdata_url: http://keycloak.ml-platform.svc:8080/realms/ml-platform/protocol/openid-connect/userinfo
        login_service: Keycloak
        username_claim: preferred_username
        scope:
          - openid
          - profile
          - email
        allow_all: true
      KubeSpawner:
        args:
          - "--ServerApp.tornado_settings={\"headers\":{\"Content-Security-Policy\":\"frame-ancestors 'self' http://localhost:4200 http://localhost:8080\"}}"
    services:
      platform-api:
        api_token: platform-api-service-token
    extraConfig:
      00-security.py: |
        c.JupyterHub.tornado_settings = {
          "headers": {
            "Content-Security-Policy": "frame-ancestors 'self' https://portal.ml-platform.local"
          }
        }

  singleuser:
    image:
      name: ml-platform-notebook
      tag: latest
      pullPolicy: IfNotPresent
    extraEnv:
      MLFLOW_TRACKING_URI: http://backend.ml-platform.svc:8080/api/v1/mlflow-proxy
      AWS_ENDPOINT_URL: "http://minio.ml-platform.svc:9000"
      AWS_ALLOW_HTTP: "true"
    extraEnvFrom:
      - secretRef:
          name: sample-data-readonly-credentials
    networkPolicy:
      egressAllowRules:
        privateIPs: true
    profileList:
      - display_name: Exploratory
        description: Interactive data exploration and small experiments
        slug: exploratory
        default: true
        kubespawner_override:
          cpu_guarantee: 1
          cpu_limit: 2
          mem_guarantee: 2G
          mem_limit: 4G
    extraVolumes:
      - name: sample-notebook
        configMap:
          name: sample-notebook
    extraVolumeMounts:
      - name: sample-notebook
        mountPath: /home/jovyan/examples/sample-delta-data.ipynb
        subPath: sample-delta-data.ipynb
        readOnly: true
    storage:
      type: dynamic
      capacity: 10Gi
      homeMountPath: /home/jovyan

  cull:
    enabled: true
    timeout: 1800
    every: 300
    users: true
    removeNamedServers: true
