jupyterhub:
  prePuller:
    hook:
      enabled: false
    continuous:
      enabled: false
  hub:
    db:
      type: postgres
      url: postgresql://postgres:localdevpassword@postgresql.ml-platform.svc.cluster.local:5432/jupyterhub
    config:
      JupyterHub:
        authenticator_class: generic-oauth
        load_roles:
          - name: jupyterhub-idle-culler
            scopes:
              - list:users
              - read:users:activity
              - admin:servers
              - delete:servers
              - admin:users
            services:
              - jupyterhub-idle-culler
          - name: platform-api-role
            scopes:
              - admin:users
              - admin:servers
            services:
              - platform-api
      Authenticator:
        auto_login: true
      GenericOAuthenticator:
        client_id: ml-platform-jupyterhub
        client_secret: ml-platform-jupyterhub-secret
        authorize_url: http://172.16.100.10:30080/realms/ml-platform/protocol/openid-connect/auth
        token_url: http://keycloak.ml-platform.svc:8080/realms/ml-platform/protocol/openid-connect/token
        userdata_url: http://keycloak.ml-platform.svc:8080/realms/ml-platform/protocol/openid-connect/userinfo
        login_service: Keycloak
        username_claim: preferred_username
        scope:
          - openid
          - profile
          - email
        allow_all: true
      KubeSpawner:
        args:
          - "--ServerApp.tornado_settings={\"headers\":{\"Content-Security-Policy\":\"frame-ancestors 'self' http://localhost:4200 http://localhost:8080\"}}"
    services:
      platform-api:
        api_token: ml-platform-jupyterhub-token
        admin: true
    extraConfig:
      00-security.py: |
        # NOTE: jupyter-iframe-commands bridge uses postMessage/Comlink for host-iframe
        # communication. This is not restricted by CSP — no connect-src or other CSP
        # changes needed for the bridge to function.
        c.JupyterHub.tornado_settings = {
          "headers": {
            "Content-Security-Policy": "frame-ancestors 'self' https://portal.ml-platform.local"
          }
        }
      01-named-servers.py: |
        c.JupyterHub.allow_named_servers = True
        c.JupyterHub.named_server_limit_per_user = 10

        async def pre_spawn_hook(spawner):
            username = spawner.user.name
            spawner.environment['MLFLOW_MODEL_PREFIX'] = f'{username}/'

            server_name = spawner.name  # analysis UUID used as server name
            if server_name:
                spawner.environment['ANALYSIS_ID'] = server_name
                spawner.environment['ANALYSIS_S3_PATH'] = f's3://ml-platform/analysis/{username}/{server_name}/'
                spawner.environment['MLFLOW_EXPERIMENT_PREFIX'] = f'{username}/{server_name}/'

            # Allow custom notebook image override via spawn options
            user_options = spawner.user_options or {}
            custom_image = user_options.get('image')
            if custom_image:
                spawner.image = custom_image

            # Feature 010: Resource profile override via spawn options
            cpu_guarantee = user_options.get('cpu_guarantee')
            cpu_limit = user_options.get('cpu_limit')
            mem_guarantee = user_options.get('mem_guarantee')
            mem_limit = user_options.get('mem_limit')
            if cpu_guarantee is not None:
                spawner.cpu_guarantee = float(cpu_guarantee)
            if cpu_limit is not None:
                spawner.cpu_limit = float(cpu_limit)
            if mem_guarantee is not None:
                spawner.mem_guarantee = mem_guarantee
            if mem_limit is not None:
                spawner.mem_limit = mem_limit

            # Sandbox Jupyter file browser to the S3-backed workspace
            spawner.notebook_dir = '/home/jovyan/work'

            # Add s3fs sidecar to mount analysis S3 prefix
            if server_name:
                spawner.extra_containers = [{
                    'name': 's3fs-workspace',
                    'image': 'ml-platform-s3fs-sidecar:latest',
                    'securityContext': {'privileged': True},
                    'env': [
                        {'name': 'S3_BUCKET', 'value': 'ml-platform'},
                        {'name': 'S3_PREFIX', 'value': f'analysis/{username}/{server_name}'},
                        {'name': 'S3_ENDPOINT', 'value': 'http://minio.ml-platform.svc:9000'},
                        {'name': 'AWS_ACCESS_KEY_ID', 'valueFrom': {'secretKeyRef': {'name': 's3-credentials', 'key': 'access-key'}}},
                        {'name': 'AWS_SECRET_ACCESS_KEY', 'valueFrom': {'secretKeyRef': {'name': 's3-credentials', 'key': 'secret-key'}}},
                    ],
                    'volumeMounts': [
                        {'name': 'workspace-fuse', 'mountPath': '/mnt/workspace', 'mountPropagation': 'Bidirectional'},
                        {'name': 's3fs-ready', 'mountPath': '/mnt/ready'},
                    ],
                }]

            # Wait for s3fs mount before starting Jupyter
            spawner.cmd = ['sh', '-c', 'until [ -f /tmp/s3fs-ready/.done ]; do sleep 0.5; done; exec jupyterhub-singleuser --notebook-dir=/home/jovyan/work']

        c.KubeSpawner.pre_spawn_hook = pre_spawn_hook

  singleuser:
    cpu:
      guarantee: 1
      limit: 2
    memory:
      guarantee: 2G
      limit: 4G
    image:
      name: ml-platform-notebook
      tag: latest
      pullPolicy: IfNotPresent
      pullSecrets:
        - registry-credentials
    extraEnv:
      MLFLOW_TRACKING_URI: http://mlflow.ml-platform.svc:5000
      S3_PREFIX: ml-platform
      AWS_ENDPOINT_URL: "http://minio.ml-platform.svc:9000"
      AWS_ALLOW_HTTP: "true"
      AWS_ACCESS_KEY_ID:
        valueFrom:
          secretKeyRef:
            name: s3-credentials
            key: access-key
      AWS_SECRET_ACCESS_KEY:
        valueFrom:
          secretKeyRef:
            name: s3-credentials
            key: secret-key
    networkPolicy:
      egressAllowRules:
        privateIPs: true
    profileList:
      - display_name: Exploratory
        description: Interactive data exploration and small experiments
        slug: exploratory
        default: true
    storage:
      type: none
      extraVolumes:
        - name: workspace-fuse
          emptyDir: {}
        - name: s3fs-ready
          emptyDir: {}
        - name: home-ephemeral
          emptyDir: {}
        - name: jupyterlab-config
          configMap:
            name: jupyterlab-config
      extraVolumeMounts:
        - name: home-ephemeral
          mountPath: /home/jovyan
        - name: workspace-fuse
          mountPath: /home/jovyan/work
          mountPropagation: HostToContainer
        - name: s3fs-ready
          mountPath: /tmp/s3fs-ready
          readOnly: true
        # JupyterLab UI restrictions — mounted from ConfigMap so they apply
        # regardless of which notebook image the user selects (default or custom).
        - name: jupyterlab-config
          mountPath: /opt/conda/etc/jupyter/labconfig/page_config.json
          subPath: page_config.json
          readOnly: true
        - name: jupyterlab-config
          mountPath: /opt/conda/share/jupyter/lab/settings/overrides.json
          subPath: overrides.json
          readOnly: true

  cull:
    enabled: true
    timeout: 1800
    every: 300
    users: true
    removeNamedServers: true
