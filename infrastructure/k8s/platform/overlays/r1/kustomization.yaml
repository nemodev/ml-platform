apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: frontend-nodeport-patch.yaml
    target:
      kind: Service
      name: frontend
      namespace: ml-platform
  - path: backend-r1-patch.yaml
    target:
      kind: Deployment
      name: backend
      namespace: ml-platform
  - path: frontend-r1-patch.yaml
    target:
      kind: Deployment
      name: frontend
      namespace: ml-platform
