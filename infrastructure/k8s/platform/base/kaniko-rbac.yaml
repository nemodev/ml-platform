apiVersion: v1
kind: ServiceAccount
metadata:
  name: kaniko-builder
  namespace: ml-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kaniko-builder
  namespace: ml-platform
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kaniko-builder
  namespace: ml-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kaniko-builder
subjects:
  - kind: ServiceAccount
    name: kaniko-builder
    namespace: ml-platform
  - kind: ServiceAccount
    name: backend
    namespace: ml-platform
