apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-template
  namespace: ml-platform
data:
  default.conf.template: |
    server {
      listen 8080;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;
      resolver 10.43.0.10 valid=10s ipv6=off;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /api/ {
        set $api_upstream ${API_UPSTREAM};
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location = /mlflow {
        return 302 /mlflow/;
      }

      location /mlflow/ {
        set $mlflow_upstream ${MLFLOW_UPSTREAM};
        rewrite ^/mlflow/(.*)$ /$1 break;
        proxy_pass $mlflow_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /keycloak/ {
        set $keycloak_upstream ${KEYCLOAK_UPSTREAM};
        rewrite ^/keycloak/(.*)$ /$1 break;
        proxy_pass $keycloak_upstream;
        proxy_http_version 1.1;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 24k;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /realms/ {
        set $keycloak_upstream ${KEYCLOAK_UPSTREAM};
        proxy_pass $keycloak_upstream;
        proxy_http_version 1.1;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 24k;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /resources/ {
        set $keycloak_upstream ${KEYCLOAK_UPSTREAM};
        proxy_pass $keycloak_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
