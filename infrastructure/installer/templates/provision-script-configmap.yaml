apiVersion: v1
kind: ConfigMap
metadata:
  name: provision-sample-data-script
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/part-of: ml-platform
    app.kubernetes.io/component: sample-data
data:
  provision.py: |
    """Provision California Housing Delta table to S3.

    Idempotent: safe to re-run. Uses mode="overwrite" to ensure
    the latest version of the dataset is always present.

    The dataset is pre-cached in the notebook image at build time
    (no internet access required at runtime).
    """
    import os
    import sys

    import pandas as pd
    from sklearn.datasets import fetch_california_housing
    from deltalake import write_deltalake, DeltaTable

    BUCKET = os.environ.get("S3_BUCKET", "__S3_BUCKET__")
    TABLE_PATH = f"s3://{BUCKET}/sample-data/california-housing"

    storage_options = {
        "AWS_ENDPOINT_URL": os.environ["AWS_ENDPOINT_URL"],
        "AWS_ACCESS_KEY_ID": os.environ["AWS_ACCESS_KEY_ID"],
        "AWS_SECRET_ACCESS_KEY": os.environ["AWS_SECRET_ACCESS_KEY"],
        "AWS_ALLOW_HTTP": os.environ.get("AWS_ALLOW_HTTP", "true"),
        "AWS_S3_ALLOW_UNSAFE_RENAME": "true",
    }

    def main():
        print(f"Loading California Housing dataset...")
        data = fetch_california_housing(as_frame=True)
        df = data.frame

        df = df.rename(columns={"MedHouseVal": "MedHouseVal"})

        print(f"Dataset shape: {df.shape}")
        print(f"Columns: {df.columns.tolist()}")

        print(f"Writing Delta table to {TABLE_PATH}...")
        write_deltalake(
            TABLE_PATH,
            df,
            mode="overwrite",
            storage_options=storage_options,
        )
        print(f"Delta table written to {TABLE_PATH}")

        print("Verifying Delta table...")
        dt = DeltaTable(TABLE_PATH, storage_options=storage_options)
        verify_df = dt.to_pandas()
        row_count = len(verify_df)
        col_count = len(verify_df.columns)
        print(f"Verification: {row_count} rows, {col_count} columns")

        expected_columns = [
            "MedInc", "HouseAge", "AveRooms", "AveBedrms",
            "Population", "AveOccup", "Latitude", "Longitude",
            "MedHouseVal",
        ]
        actual_columns = verify_df.columns.tolist()
        if actual_columns != expected_columns:
            print(f"ERROR: Column mismatch! Expected {expected_columns}, got {actual_columns}")
            sys.exit(1)

        if row_count != 20640:
            print(f"WARNING: Expected 20640 rows, got {row_count}")

        print("Provisioning complete!")

    if __name__ == "__main__":
        main()
