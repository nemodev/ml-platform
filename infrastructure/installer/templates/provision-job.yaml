apiVersion: batch/v1
kind: Job
metadata:
  name: provision-sample-data
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/part-of: ml-platform
    app.kubernetes.io/component: sample-data
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: ml-platform
        app.kubernetes.io/component: sample-data
    spec:
      restartPolicy: Never
      containers:
        - name: provision
          image: __NOTEBOOK_IMAGE__
          imagePullPolicy: IfNotPresent
          command: ["python", "/scripts/provision.py"]
          env:
            - name: AWS_ENDPOINT_URL
              value: __S3_ENDPOINT__
            - name: AWS_ACCESS_KEY_ID
              value: __S3_ACCESS_KEY__
            - name: AWS_SECRET_ACCESS_KEY
              value: __S3_SECRET_KEY__
            - name: AWS_ALLOW_HTTP
              value: "__S3_ALLOW_HTTP__"
            - name: S3_BUCKET
              value: __S3_BUCKET__
          volumeMounts:
            - name: provision-script
              mountPath: /scripts
              readOnly: true
            - name: sample-data
              mountPath: /data
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: provision-script
          configMap:
            name: provision-sample-data-script
        - name: sample-data
          configMap:
            name: california-housing-data
