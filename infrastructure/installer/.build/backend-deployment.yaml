apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ml-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        hub.jupyter.org/network-access-hub: "true"
    spec:
      serviceAccountName: backend
      containers:
        - name: backend
          image: 172.16.100.10:30500/ml-platform/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: default
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgresql.ml-test.svc:5432/ml_platform
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              value: localdevpassword
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: http://172.16.100.10:30081/realms/ml-platform
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: http://keycloak.ml-test.svc.cluster.local:8080/realms/ml-platform/protocol/openid-connect/certs
            - name: JUPYTERHUB_API_TOKEN
              value: ml-platform-jupyterhub-token
            - name: WORKSPACE_DEFAULT_NOTEBOOK
              value: examples/sample-delta-data.ipynb
            - name: APP_CORS_ALLOWED_ORIGINS
              value: http://172.16.100.10:30081
            - name: SERVICES_JUPYTERHUB_URL
              value: http://ml-test-jupyterhub-hub.ml-test.svc:8081
            - name: SERVICES_JUPYTERHUB_PROXY_URL
              value: http://ml-test-jupyterhub-proxy-public.ml-test.svc:80
            - name: SERVICES_JUPYTERHUB_PUBLIC_URL
              value: http://172.16.100.10:30081
            - name: SERVICES_MLFLOW_URL
              value: http://mlflow.ml-test.svc:5000
            - name: SERVICES_MLFLOW_TRACKING_URL
              value: /mlflow
            - name: SERVICES_MLFLOW_ARTIFACT_DESTINATION
              value: s3://ml-test/mlflow/artifacts
            - name: SERVICES_AIRFLOW_URL
              value: http://airflow-webserver.ml-test.svc:8080
            - name: SERVICES_MINIO_ENDPOINT
              value: http://minio.ml-platform.svc:9000
            - name: SERVICES_MINIO_ACCESS_KEY
              value: minioadmin
            - name: SERVICES_MINIO_SECRET_KEY
              value: minioadmin
            - name: SERVICES_MINIO_PIPELINES_BUCKET
              value: ml-test
            - name: SERVICES_MINIO_PIPELINES_PREFIX
              value: pipelines
            - name: SERVICES_KSERVE_NAMESPACE
              value: ml-test
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
