image:
  repository: ghcr.io/mlflow/mlflow
  tag: v3.10.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5000

database:
  host: postgresql.ml-test.svc
  port: 5432
  name: mlflow
  user: postgres
  password: localdevpassword

minio:
  endpoint: http://minio.ml-platform.svc:9000
  secretName: ""
  accessKeyKey: ""
  secretKeyKey: ""
  accessKey: minioadmin
  secretKey: minioadmin

mlflow:
  gunicornWorkers: 2
  allowedHosts: "mlflow.ml-test.svc*,localhost,10.*,172.*,192.168.*"
  artifactRoot: "mlflow-artifacts:/"
  artifactDestination: s3://ml-test/mlflow/artifacts
  s3EndpointUrl: http://minio.ml-platform.svc:9000
  s3IgnoreTls: "true"
  backendStoreUri: postgresql://postgres:localdevpassword@postgresql.ml-test.svc:5432/mlflow

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi
