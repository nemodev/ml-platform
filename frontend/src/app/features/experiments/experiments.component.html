<section class="experiments-page">
  <h2>Experiments</h2>

  <div class="error-card" *ngIf="errorMessage">
    <p>{{ errorMessage }}</p>
    <button type="button" (click)="retry()">Retry</button>
  </div>

  <div class="loading-card" *ngIf="loadingIframe">
    <div class="spinner"></div>
    <p>Loading MLflow UI...</p>
  </div>

  <div class="experiments-layout" *ngIf="!loadingIframe && iframeUrl">
    <aside class="experiment-list">
      <h3>Your Experiments</h3>

      <div class="loading-list" *ngIf="loadingExperiments">Loading experiments...</div>

      <ul *ngIf="!loadingExperiments && experiments.length > 0">
        <li *ngFor="let experiment of experiments">
          <button
            type="button"
            [class.active]="selectedExperimentId === experiment.experimentId"
            (click)="selectExperiment(experiment)"
          >
            <span class="name">{{ experiment.name }}</span>
            <span class="meta">{{ experiment.lifecycleStage }}</span>
          </button>
        </li>
      </ul>

      <p class="empty-state" *ngIf="!loadingExperiments && experiments.length === 0">
        No experiments yet. Log a run from Notebooks to get started.
      </p>
    </aside>

    <div class="iframe-shell">
      <iframe
        [src]="iframeUrl"
        title="MLflow Tracking"
        allow="clipboard-read; clipboard-write"
      ></iframe>
    </div>
  </div>
</section>
