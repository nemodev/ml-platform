<section class="experiments-page">
  <h2>Experiments</h2>

  <div class="error-card" *ngIf="errorMessage">
    <p>{{ errorMessage }}</p>
    <button type="button" (click)="retry()">Retry</button>
  </div>

  <div class="loading-card" *ngIf="loadingIframe">
    <div class="spinner"></div>
    <p>Loading MLflow UI...</p>
  </div>

  <div class="iframe-shell" *ngIf="!loadingIframe && iframeUrl">
    <iframe
      id="mlflow-experiments-iframe"
      [src]="iframeUrl"
      title="MLflow Tracking"
      allow="clipboard-read; clipboard-write"
      (load)="onMlflowIframeLoad()"
    ></iframe>
  </div>
</section>
