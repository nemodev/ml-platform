<section class="workspace-page">
  <h2>Notebooks</h2>

  <div class="launcher-card" *ngIf="status === 'STOPPED'">
    <h3>{{ profile?.name || 'Exploratory' }}</h3>
    <p>{{ profile?.description || 'Interactive data exploration and small experiments' }}</p>
    <button type="button" (click)="launchWorkspace()">Launch Workspace</button>
  </div>

  <div class="pending-card" *ngIf="status === 'PENDING'">
    <div class="spinner"></div>
    <p>{{ statusMessage || 'Starting notebook server...' }}</p>
  </div>

  <div class="running-card" *ngIf="(status === 'RUNNING' || status === 'IDLE') && iframeUrl">
    <div class="toolbar">
      <div class="toolbar-left">
        <button *ngIf="bridgeConnected" type="button" class="toolbar-btn"
                [class.active]="sidebarVisible" (click)="toggleSidebar()"
                title="Toggle File Browser">
          &#9776; Files
        </button>
        <button *ngIf="bridgeConnected" type="button" class="toolbar-btn"
                (click)="toggleTheme()" title="Switch Theme">
          {{ currentTheme === 'light' ? '&#9789; Dark' : '&#9788; Light' }}
        </button>
      </div>
      <div class="toolbar-center" *ngIf="bridgeConnected">
        <button type="button" class="toolbar-btn primary" (click)="runAll()" title="Run All Cells">
          &#9654; Run All
        </button>
        <button type="button" class="toolbar-btn" (click)="saveNotebook()" title="Save Notebook">
          &#128190; Save
        </button>
      </div>
      <div class="toolbar-right">
        <span class="kernel-status" [class]="'kernel-' + kernelStatus">
          <span class="kernel-dot"></span> {{ kernelStatusLabel }}
        </span>
        <button type="button" class="toolbar-btn terminate" (click)="terminateWorkspace()">Terminate</button>
      </div>
    </div>
    <iframe id="jupyter-iframe" [src]="iframeUrl" title="JupyterLab"
            allow="clipboard-read; clipboard-write" (load)="onIframeLoad()"></iframe>
  </div>

  <div class="error-card" *ngIf="status === 'FAILED'">
    <h3>Workspace Error</h3>
    <p>{{ errorMessage || 'Unable to start notebook workspace.' }}</p>
    <button type="button" (click)="retry()">Retry</button>
  </div>
</section>
