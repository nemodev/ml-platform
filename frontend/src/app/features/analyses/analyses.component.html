<section class="analyses-page">
  <div class="page-header">
    <h2>Analyses</h2>
    <button type="button" class="create-btn" (click)="toggleCreateForm()">
      {{ showCreateForm ? 'Cancel' : 'New Analysis' }}
    </button>
  </div>

  <div class="error-card" *ngIf="errorMessage">
    <p>{{ errorMessage }}</p>
    <button type="button" (click)="errorMessage = null">Dismiss</button>
  </div>

  <div class="create-card" *ngIf="showCreateForm">
    <h3>Create Analysis</h3>
    <div class="form-group">
      <label for="analysis-name">Name</label>
      <input id="analysis-name" type="text" [(ngModel)]="newName" placeholder="e.g. Iris Classification" />
    </div>
    <div class="form-group">
      <label for="analysis-desc">Description (optional)</label>
      <input id="analysis-desc" type="text" [(ngModel)]="newDescription" placeholder="Brief description" />
    </div>
    <button type="button" class="submit-btn" [disabled]="creating || !newName.trim()" (click)="createAnalysis()">
      {{ creating ? 'Creating...' : 'Create' }}
    </button>
  </div>

  <div class="loading-card" *ngIf="loading">
    <div class="spinner"></div>
    <p>Loading analyses...</p>
  </div>

  <div class="analysis-list" *ngIf="!loading && analyses.length > 0">
    <div class="analysis-card" *ngFor="let analysis of analyses" (click)="openAnalysis(analysis)">
      <div class="analysis-info">
        <span class="analysis-name">{{ analysis.name }}</span>
        <span class="analysis-desc" *ngIf="analysis.description">{{ analysis.description }}</span>
      </div>
      <div class="analysis-actions">
        <button type="button" class="delete-btn" (click)="deleteAnalysis(analysis, $event)" title="Delete">Delete</button>
      </div>
    </div>
  </div>

  <div class="empty-state" *ngIf="!loading && analyses.length === 0 && !showCreateForm">
    <p>No analyses yet. Create one to get started with notebooks and experiments.</p>
  </div>
</section>
